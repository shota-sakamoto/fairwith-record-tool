<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>フェアウィズ記録転記ツール</title>
<style>
  :root {
    --primary: #2563eb;
    --primary-light: #dbeafe;
    --primary-dark: #1d4ed8;
    --bg: #f8fafc;
    --card: #ffffff;
    --border: #e2e8f0;
    --text: #1e293b;
    --text-muted: #64748b;
    --success: #16a34a;
    --success-bg: #f0fdf4;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Kaku Gothic ProN', 'Segoe UI', Meiryo, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }
  .header {
    background: var(--primary);
    color: #fff;
    padding: 16px 20px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(37,99,235,0.15);
  }
  .header h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.02em;
  }
  .header p {
    font-size: 12px;
    opacity: 0.85;
    margin-top: 2px;
  }
  .container {
    max-width: 800px;
    margin: 0 auto;
    padding: 16px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 16px;
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  textarea {
    width: 100%;
    min-height: 160px;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    font-size: 14px;
    font-family: inherit;
    line-height: 1.7;
    resize: vertical;
    transition: border-color 0.2s;
  }
  textarea:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
  }
  .btn-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary {
    background: var(--primary);
    color: #fff;
  }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-primary:disabled {
    background: #94a3b8;
    cursor: not-allowed;
  }
  .btn-secondary {
    background: #f1f5f9;
    color: var(--text-muted);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { background: #e2e8f0; }
  .btn-copy {
    background: var(--success);
    color: #fff;
  }
  .btn-copy:hover { background: #15803d; }

  /* 送信タイプ */
  .type-group {
    margin-bottom: 12px;
  }
  .type-group label {
    margin-bottom: 8px;
  }
  .type-options {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .type-btn {
    padding: 7px 14px;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    background: #fff;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text);
  }
  .type-btn:hover { border-color: var(--primary); color: var(--primary); }
  .type-btn.active {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
  }

  /* トピックス/要約 */
  .optional-fields {
    display: none;
    margin-top: 12px;
  }
  .optional-fields.show { display: block; }
  .optional-fields textarea {
    min-height: 80px;
  }
  .optional-fields input[type="text"] {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 14px;
    font-family: inherit;
    transition: border-color 0.2s;
  }
  .optional-fields input[type="text"]:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
  }
  .field-group { margin-bottom: 10px; }

  /* 表示切替 */
  .view-toggle {
    display: flex;
    gap: 0;
    margin-bottom: 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .view-toggle button {
    flex: 1;
    padding: 8px 12px;
    border: none;
    background: #fff;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    color: var(--text-muted);
    transition: all 0.15s;
  }
  .view-toggle button.active {
    background: var(--primary);
    color: #fff;
  }

  /* プレビュー */
  .preview {
    background: #f8fafc;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    min-height: 120px;
    font-size: 14px;
    line-height: 1.8;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .preview .block-section {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 8px;
  }
  .preview .block-section:last-child { margin-bottom: 0; }
  .preview .block-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--primary);
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .placeholder {
    color: var(--text-muted);
    font-style: italic;
    text-align: center;
    padding: 30px 0;
  }

  /* ローディング */
  .loading-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  .loading-overlay.show { display: flex; }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid #e2e8f0;
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    margin-top: 12px;
    font-size: 14px;
    color: var(--text-muted);
  }

  /* コピー成功 */
  .toast {
    display: none;
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: #1e293b;
    color: #fff;
    padding: 10px 24px;
    border-radius: 8px;
    font-size: 14px;
    z-index: 200;
    animation: fadeIn 0.3s;
  }
  .toast.show { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
</style>
</head>
<body>

<div class="header">
  <h1>フェアウィズ記録転記ツール</h1>
  <p>訪問記録 → 社外送信フォーマット変換</p>
</div>

<div class="container">
  <!-- 入力エリア -->
  <div class="card">
    <label>元記録を貼り付け</label>
    <textarea id="inputRecord" placeholder="訪問看護記録をここに貼り付けてください…"></textarea>
    <div class="btn-row">
      <button class="btn btn-primary" id="btnConvert" onclick="convertRecord()">▶ 変換</button>
      <button class="btn btn-secondary" onclick="clearAll()">✕ クリア</button>
    </div>
  </div>

  <!-- 送信タイプ & オプション -->
  <div class="card">
    <div class="type-group">
      <label>送信タイプ</label>
      <div class="type-options">
        <button class="type-btn active" data-type="normal" onclick="setType(this)">普段と変わらない</button>
        <button class="type-btn" data-type="topics" onclick="setType(this)">トピックスあり</button>
      </div>
    </div>
    <div class="optional-fields" id="topicFields">
      <div class="field-group">
        <label>トピックス / 要約</label>
        <textarea id="inputTopics" placeholder="特記事項やトピックスを入力…"></textarea>
      </div>
      <div class="field-group">
        <label>宛先への依頼（@クリニック様など）</label>
        <input type="text" id="inputRequest" placeholder="例：@〇〇クリニック様 処方確認をお願いします">
      </div>
    </div>
  </div>

  <!-- 出力エリア -->
  <div class="card">
    <div class="view-toggle">
      <button class="active" onclick="setView('block', this)">ブロック表示</button>
      <button onclick="setView('preview', this)">プレビュー</button>
    </div>
    <div class="preview" id="outputArea">
      <div class="placeholder">元記録を貼り付けて「変換」を押してください</div>
    </div>
    <div class="btn-row" style="margin-top: 10px;">
      <button class="btn btn-copy" onclick="copyOutput()">コピー</button>
    </div>
  </div>
</div>

<!-- ローディング -->
<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="loading-text">変換中…</div>
</div>

<!-- トースト -->
<div class="toast" id="toast">クリップボードにコピーしました</div>

<script>
  let currentType = 'normal';
  let currentView = 'block';
  let convertedText = ''; // 変換結果テキスト
  let convertedParts = null; // ブロック表示用パーツ

  function setType(el) {
    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    currentType = el.dataset.type;
    const fields = document.getElementById('topicFields');
    fields.classList.toggle('show', currentType === 'topics');
  }

  function setView(view, el) {
    currentView = view;
    document.querySelectorAll('.view-toggle button').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    renderOutput();
  }

  function clearAll() {
    document.getElementById('inputRecord').value = '';
    document.getElementById('inputTopics').value = '';
    document.getElementById('inputRequest').value = '';
    convertedText = '';
    convertedParts = null;
    document.getElementById('outputArea').innerHTML = '<div class="placeholder">元記録を貼り付けて「変換」を押してください</div>';
  }

  async function convertRecord() {
    const input = document.getElementById('inputRecord').value.trim();
    if (!input) { alert('元記録を入力してください'); return; }

    const topics = document.getElementById('inputTopics').value.trim();
    const request = document.getElementById('inputRequest').value.trim();

    const loading = document.getElementById('loading');
    const btn = document.getElementById('btnConvert');
    loading.classList.add('show');
    btn.disabled = true;

    try {
      const sendType = currentType === 'normal' ? '普段と変わらない' : 'トピックスあり';

      let systemPrompt = `あなたは訪問看護ステーション「フェアウィズ訪問看護ステーション」の記録転記アシスタントです。
訪問看護の電子カルテ記録を、社外（ケアマネジャー・主治医等）へ送信するためのメッセージ文に変換してください。

【出力フォーマット】
以下の形式で、そのままコピペして送信できる文章を生成してください。

---
お世話になっております。本日の記録を転記いたします。{状態の概要を1文}引き続きどうぞよろしくお願いします。

体温 (℃)：{値}
血圧(㎜Hg)：{値}
脈拍数 (回/分)：{値}
Spo2（％）：{値}

実施内容：{カンマ区切りで列挙}
医療の実施: {該当あれば記載、なければ「なし」}

記録：
{元記録の内容を敬語・丁寧語で整理。箇条書きではなく自然な文章で。観察所見、ケア内容、患者・家族の発言、今後の方針などを含む}
---

【ルール】
- 冒頭の挨拶文は必ず「お世話になっております。本日の記録を転記いたします。」で始める
- 状態の概要は「大きく変わりありません。」「少し変化がありました。」など端的に
- バイタルは元記録から正確に抽出し、単位を含めて記載
- 記録部分は元記録の内容を読みやすく整理するが、情報を省略しない
- 敬語・丁寧語を使用するが、過度に丁寧にしすぎない
- 個人情報は元記録のまま維持
- 医療用語は正確に使用
- 出力はフォーマット通りのテキストのみ。JSON や見出し記号（【】や■）は使わない`;

      if (sendType === 'トピックスあり') {
        systemPrompt += `\n\n【トピックスありの場合】
バイタル情報の前に「★トピックス」セクションを追加してください。
形式：
★トピックス
{要約やトピックスの内容}

宛先への依頼がある場合は、記録の後に依頼内容を追記してください。`;
      }

      let userMsg = `以下の訪問看護記録を社外送信用フォーマットに変換してください。\n\n送信タイプ：${sendType}\n\n【元記録】\n${input}`;

      if (currentType === 'topics' && topics) {
        userMsg += `\n\n【トピックス・要約として含めたい内容】\n${topics}`;
      }
      if (currentType === 'topics' && request) {
        userMsg += `\n\n【宛先への依頼】\n${request}`;
      }

      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1500,
          system: systemPrompt,
          messages: [{ role: 'user', content: userMsg }]
        })
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.error?.message || 'API error: ' + response.status);
      }
      if (!data.content || !Array.isArray(data.content)) {
        throw new Error('不正なレスポンス形式です');
      }

      convertedText = data.content
        .filter(c => c.type === 'text')
        .map(c => c.text || '')
        .join('')
        .trim();

      // ブロック表示用にパーツ分割
      convertedParts = parseIntoParts(convertedText);

      renderOutput();
    } catch (err) {
      console.error(err);
      document.getElementById('outputArea').innerHTML = `<div class="placeholder" style="color:#dc2626;">変換エラー: ${err.message}</div>`;
    } finally {
      loading.classList.remove('show');
      btn.disabled = false;
    }
  }

  function parseIntoParts(text) {
    const parts = {};
    // 挨拶部分（最初の段落）
    const lines = text.split('\n');
    let section = 'greeting';
    let currentLines = [];

    for (const line of lines) {
      const trimmed = line.trim();
      if (trimmed.startsWith('体温') || trimmed.startsWith('血圧') || trimmed.startsWith('脈拍') || trimmed.startsWith('Spo2') || trimmed.startsWith('SpO2')) {
        if (currentLines.length > 0 && !parts[section]) {
          parts[section] = currentLines.join('\n').trim();
          currentLines = [];
        }
        section = 'vitals';
        currentLines.push(line);
      } else if (trimmed.startsWith('実施内容')) {
        if (currentLines.length > 0) { parts[section] = currentLines.join('\n').trim(); currentLines = []; }
        section = 'care';
        currentLines.push(line);
      } else if (trimmed.startsWith('医療の実施')) {
        currentLines.push(line);
      } else if (trimmed === '記録：' || trimmed === '記録:') {
        if (currentLines.length > 0) { parts[section] = currentLines.join('\n').trim(); currentLines = []; }
        section = 'record';
      } else if (trimmed.startsWith('★トピックス')) {
        if (currentLines.length > 0) { parts[section] = currentLines.join('\n').trim(); currentLines = []; }
        section = 'topics';
      } else {
        currentLines.push(line);
      }
    }
    if (currentLines.length > 0) {
      parts[section] = currentLines.join('\n').trim();
    }
    return parts;
  }

  function renderOutput() {
    const area = document.getElementById('outputArea');
    if (!convertedText) return;

    if (currentView === 'block' && convertedParts) {
      let html = '';
      const sectionMap = [
        { key: 'greeting', title: '挨拶' },
        { key: 'topics', title: 'トピックス' },
        { key: 'vitals', title: 'バイタルサイン' },
        { key: 'care', title: '実施内容' },
        { key: 'record', title: '記録' },
      ];
      sectionMap.forEach(s => {
        if (convertedParts[s.key]) {
          html += `<div class="block-section"><div class="block-title">${s.title}</div>${escapeHtml(convertedParts[s.key])}</div>`;
        }
      });
      // 分類されなかった部分があれば表示
      Object.keys(convertedParts).forEach(k => {
        if (!sectionMap.find(s => s.key === k) && convertedParts[k]) {
          html += `<div class="block-section"><div class="block-title">その他</div>${escapeHtml(convertedParts[k])}</div>`;
        }
      });
      area.innerHTML = html || `<div class="placeholder">変換結果が空です</div>`;
    } else {
      // プレビュー（テキストそのまま表示）
      area.textContent = convertedText;
    }
  }

  function escapeHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
  }

  function copyOutput() {
    if (!convertedText) { alert('変換結果がありません'); return; }

    navigator.clipboard.writeText(convertedText).then(() => {
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = convertedText;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    });
  }
</script>
</body>
</html>
